name=BytePack
version=0.2.0
author=Maximiliano Ramirez <maximiliano.ramirezbravo@gmail.com>
maintainer=Maximiliano Ramirez <maximiliano.ramirezbravo@gmail.com>
sentence=Header-only message serialization library with zero dynamic memory allocation.
paragraph=Plain structs with a single io() member function drive serialization, deserialization and compile-time size counting. Includes quantized values (Quant), length-prefixed payloads (Bytes), [ID][VERSION] message headers and a frame dispatch helper. Explicit little-endian wire format with no padding, portable across architectures. Pairs naturally with ByteFrame to delimit messages over a raw stream.
category=Data Processing
